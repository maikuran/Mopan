<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月本国地図</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#map{
    width:100%;
    height:100%;
    background:#8fd3ff;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 地図サイズ
const mapWidth = 1600;
const mapHeight = 1600;

const bounds = [
    [0, 0],
    [mapHeight, mapWidth]
];

// 地図作成
const map = L.map("map", {
    crs: L.CRS.Simple,
    center: [800, 800],
    zoom: 0,
    minZoom: 0,
    maxZoom: 6,
    zoomSnap: 0.25,
    zoomDelta: 0.25,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0
});

// タイル画像
L.tileLayer("tiles/{z}/{x}/{y}.png", {
    tileSize: 800,
    noWrap: true,
    bounds: bounds,
    minZoom: 0,
    maxZoom: 4,
    errorTileUrl: ""
}).addTo(map);

// 初期表示
map.fitBounds(bounds);

</script>

</body>
</html>// 初期表示
