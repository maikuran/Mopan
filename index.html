<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月本国地図</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#map{
    width:100%;
    height:100%;
    background:#8fd3ff;
}
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 地図サイズ
const mapWidth = 1600;
const mapHeight = 1600;

const bounds = [
    [0,0],
    [mapHeight,mapWidth]
];

// Leaflet
const map = L.map("map",{
    crs: L.CRS.Simple,
    minZoom: 0,
    maxZoom: 4,
    zoomSnap: 1,
    zoomControl: true,
    attributionControl: false
});

// タイル画像
L.tileLayer("tiles/{z}/{x}/{y}.png",{
    tileSize:256,
    noWrap:true,
    bounds:bounds,
    minZoom:0,
    maxZoom:4
}).addTo(map);

// 初期表示
map.fitBounds(bounds);

</script>

</body>
</html>
